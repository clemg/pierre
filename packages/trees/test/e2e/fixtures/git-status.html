<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>file-tree git status fixture</title>
  </head>
  <body>
    <file-tree-container id="git-status-host"></file-tree-container>

    <script type="module">
      import '/dist/web-components.js';
      import { FileTree, FileTreeModel } from '/dist/index.js';

      const host = document.getElementById('git-status-host');

      const fileTree = new FileTree(
        {
          model: FileTreeModel.fromFiles([
            'README.md',
            'package.json',
            'src/index.ts',
            'src/components/Button.tsx',
            'src/components/Card.tsx',
            'src/utils/worker.ts',
            'src/utils/stream.ts',
            'test/index.test.ts',
          ]),
          gitStatus: [
            { path: 'src/index.ts', status: 'modified' },
            { path: 'src/components/Button.tsx', status: 'added' },
            { path: 'test/index.test.ts', status: 'deleted' },
          ],
        },
        {
          initialExpandedItems: ['src', 'src/components', 'test'],
        }
      );
      fileTree.render({ fileTreeContainer: host });

      const waitForShadowTree = async () => {
        const started = performance.now();
        while (true) {
          const root = host.shadowRoot;
          if (
            root != null &&
            root.querySelector('[data-type="item"]') != null
          ) {
            return;
          }
          if (performance.now() - started > 5000) {
            throw new Error('Timed out waiting for file-tree render');
          }
          await new Promise((resolve) => setTimeout(resolve, 16));
        }
      };

      await waitForShadowTree();
      window.__fileTreeFixtureReady = true;
    </script>
  </body>
</html>
